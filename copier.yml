project_name:
  type: str
  default: "{{ _folder_name }}"
  when: false

python_version:
  type: str
  default: "__PYTHON_VERSION__"
  when: false

is_lib:
  type: bool
  default: true

_tasks:
  - >
    {% if is_lib %}
    uv init --lib
    {% else %}
    uv init
    {% endif %}
  - >
    {% if not is_lib %}
    python -c "import os; os.makedirs('src', exist_ok=True); os.replace('main.py', 'src/main.py')"
    {% endif %}
  - ["python", "-c", "import os;", "os.makedirs('.opencode/plans', exist_ok=True)"]
  - ["uv", "add", "ruff", "pyright", "pytest", "pre-commit", "conventional-pre-commit", "--dev",]
  - ["uv", "run", "pre-commit", "install", "--hook-type", "commit-msg", "--hook-type", "pre-commit"]
  - [
      "python",
      "-c",
      "import os; f=open('.gitignore', 'a'); f.write('\\n.dev/\\n') if '.dev/' not in open('.gitignore').read() else None; f.close();",
    ]
  - [
      "python",
      "-c",
      "f=open('.python-version', 'r'); version=f.read().strip(); f.close();
      f=open('README.md'); content=f.read(); f.close();
      content = content.replace('__PYTHON_VERSION__', version);
      f=open('README.md', 'w'); f.write(content); f.close()"
    ]
  - ["uv", "version", "0.1.0.dev1"]
  - ["git", "branch", "-m", "main"]
  - ["git", "add", "*"]
  - ["git", "commit", "-m", "chore(setup): first commit"]
  - ["git", "branch", "dev"]
  - ["git", "checkout", "dev"]
  - ["git", "branch", "--list"]
