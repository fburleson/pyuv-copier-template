project_name:
  type: str
  default: "{{ _folder_name }}"
  when: false

is_lib:
  type: bool
  default: true

_tasks:
  - >
    {% if is_lib %}
    uv init --lib
    {% else %}
    uv init
    {% endif %}
  - >
    {% if not is_lib %}
    python -c "import os; os.makedirs('src', exist_ok=True); os.replace('main.py', 'src/main.py')"
    {% endif %}
  - ["uv", "add", "ruff", "pyright", "pytest", "pre-commit", "conventional-pre-commit", "--dev"]
  - ["uv", "run", "pre-commit", "install", "--hook-type", "commit-msg", "--hook-type", "pre-commit"]
  - ["git", "add", "*"]
  - ["git", "commit", "-m", "chore(setup): first commit"]
  - ["git", "branch", "dev"]
  - ["git", "checkout", "dev"]
  - ["git", "branch", "--list"]
