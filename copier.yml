_tasks:
  - ["uv", "init", "--lib"]
  - ["uv", "add", "ruff", "pyright", "pytest", "pre-commit", "--dev"]
  - ["uv", "run", "pre-commit", "install"]
  - ["git", "add", "*"]
  - ["git", "commit", "-m", "first commit"]
  - ["git", "branch", "dev"]
  - ["git", "checkout", "dev"]
  - ["git", "branch", "--list"]

project_name:
  type: str
  default: "{{ _folder_name }}"
  when: false